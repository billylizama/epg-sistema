{% extends 'base.html' %}
{% block title %}Iniciar Sesion - Sistema EPG{% endblock %}
{% block content %}
<div class="login-card">
  <div class="login-header">
    <i class="bi bi-mortarboard-fill" style="font-size:2.5rem;"></i>
    <h4 class="mt-2 mb-0">Escuela de Posgrado</h4>
    <small class="opacity-75">Sistema de Planillas</small>
  </div>
  <div class="card-body p-4">
    <form method="POST">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuario</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="Usuario"
                 required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Contrasena</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="Contrasena"
                 required>
        </div>
      </div>
      <button type="submit" class="btn btn-epg w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
      </button>
    </form>
  </div>
</div>
{% endblock %}
